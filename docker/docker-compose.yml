version: "3.9"

services:
  # ── Engrama Memory Engine ───────────────────────────────
  engrama:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: engrama-server
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - engrama-net

  # ── Qdrant Vector Database ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: engrama-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - engrama-net

volumes:
  qdrant-data:
    driver: local

networks:
  engrama-net:
    driver: bridge
